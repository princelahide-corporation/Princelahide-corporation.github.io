<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page non trouvée — PLCORP</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
</head>

<body style="display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; flex-direction:column; padding:20px;">

    <div id="cursor">
        <div id="cursor-dot"></div>
    </div>
    <div id="cursor-ring"></div>

    <h1 style="font-family:var(--font-title); font-size:clamp(4rem, 10vw, 8rem); font-weight:800; color:var(--gold); line-height:1; margin-bottom:20px;">404</h1>
    <h2 style="font-family:var(--font-title); font-size:1.5rem; margin-bottom:16px;">Page introuvable</h2>
    <p style="color:var(--muted-2); max-width:400px; margin-bottom:32px;">La page que vous recherchez semble avoir été déplacée ou n'existe pas.</p>

    <a href="index.html" class="btn btn-gold">Retour à l'accueil</a>

    <script>
        // Simple cursor script for 404 page
        const dot = document.getElementById('cursor-dot');
        const ring = document.getElementById('cursor-ring');
        let mx = 0,
            my = 0,
            rx = 0,
            ry = 0;
        document.addEventListener('mousemove', e => {
            mx = e.clientX;
            my = e.clientY;
        });
        (function track() {
            if (dot && ring) {
                dot.style.left = mx + 'px';
                dot.style.top = my + 'px';
                rx += (mx - rx) * 0.14;
                ry += (my - ry) * 0.14;
                ring.style.left = rx + 'px';
                ring.style.top = ry + 'px';
                requestAnimationFrame(track);
            }
        })();
    </script>
</body>

</html>
