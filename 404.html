<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page introuvable — PLCORP</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" href="assets/img/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script>(function(){var t=localStorage.getItem('plcorp-theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
  <style>
    .glitch {
      position: relative;
      animation: glitch-shift 4s infinite;
    }
    .glitch::before, .glitch::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      font-family: inherit;
      font-size: inherit;
      font-weight: inherit;
      line-height: inherit;
      text-transform: inherit;
      letter-spacing: inherit;
    }
    .glitch::before {
      background: linear-gradient(90deg, #0055FF, #7B2FBE, #4DA3FF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 200% auto;
      animation: grad-shift 4s linear infinite, glitch-1 3s infinite;
      clip-path: polygon(0 0, 100% 0, 100% 40%, 0 40%);
    }
    .glitch::after {
      background: linear-gradient(90deg, #2979FF, #9C4DCC);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: glitch-2 3s infinite;
      clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
    }
    @keyframes glitch-1 {
      0%,90%,100% { transform: none; }
      92% { transform: translateX(-4px) skewX(-1deg); }
      94% { transform: translateX(4px) skewX(1deg); }
      96% { transform: translateX(-2px); }
    }
    @keyframes glitch-2 {
      0%,90%,100% { transform: none; }
      91% { transform: translateX(4px) skewX(1deg); }
      93% { transform: translateX(-4px) skewX(-1deg); }
      95% { transform: translateX(2px); }
    }
    @keyframes glitch-shift {
      0%,100% { transform: none; }
    }
  </style>
</head>
<body>

<div id="theme-sweep"></div>
<div id="cursor-dot"></div>
<div id="cursor-ring"></div>

<div class="error-page">
  <div style="position:absolute;top:0;left:0;right:0;bottom:0;overflow:hidden;pointer-events:none;">
    <div style="position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(41,121,255,0.12) 0%,transparent 70%);top:-100px;right:-100px;border-radius:50%;"></div>
    <div style="position:absolute;width:300px;height:300px;background:radial-gradient(circle,rgba(123,47,190,0.1) 0%,transparent 70%);bottom:50px;left:-50px;border-radius:50%;"></div>
  </div>
  <div style="position:relative;z-index:1;">
    <a href="index.html" class="logo" style="display:inline-flex;margin-bottom:48px;"><img src="assets/img/logo.png" alt="Logo PLCORP"><span class="logo-text">PLCORP</span></a>
    <div class="error-code glitch" data-text="404">404</div>
    <h1 class="error-title">Page introuvable</h1>
    <p class="error-sub">La page que vous recherchez semble avoir été déplacée, supprimée ou n'existe pas.</p>
    <div style="display:flex;gap:16px;flex-wrap:wrap;justify-content:center;">
      <a href="index.html" class="btn btn-primary">
        <i class="fas fa-home"></i> Retour à l'accueil
      </a>
      <a href="contact.html" class="btn btn-outline">
        <i class="fas fa-envelope"></i> Nous contacter
      </a>
    </div>
    <div style="margin-top:48px;display:flex;gap:24px;justify-content:center;flex-wrap:wrap;">
      <a href="services.html" style="font-family:var(--font-mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);transition:color 0.2s;" onmouseenter="this.style.color='var(--blue-light)'" onmouseleave="this.style.color='var(--muted2)'">Nos Services</a>
      <a href="about.html" style="font-family:var(--font-mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);transition:color 0.2s;" onmouseenter="this.style.color='var(--blue-light)'" onmouseleave="this.style.color='var(--muted2)'">À Propos</a>
      <a href="contact.html" style="font-family:var(--font-mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);transition:color 0.2s;" onmouseenter="this.style.color='var(--blue-light)'" onmouseleave="this.style.color='var(--muted2)'">Contact</a>
    </div>
  </div>
</div>

<script src="assets/js/main.js"></script>
</body>
</html>
